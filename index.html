<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b1020">
<title>ראש בראש — קרב מוחות</title>
<style>
/* ═══════════ ראש בראש — עיצוב ═══════════ */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg0: #0b1020;
  --bg1: #141a35;
  --card: rgba(255,255,255,.06);
  --card2: rgba(255,255,255,.10);
  --line: rgba(255,255,255,.12);
  --txt: #eef1ff;
  --dim: #9aa3c7;
  --acc: #7c6cf0;
  --acc2: #a89bff;
  --gold: #ffd166;
  --green: #3ddc84;
  --red: #ff5470;
  --wa: #25d366;
  --r: 20px;
  --shadow: 0 10px 30px rgba(0,0,0,.35);
}

html, body { height: 100%; }
body {
  font-family: "Segoe UI", "Heebo", "Arial Hebrew", Arial, sans-serif;
  background: radial-gradient(1200px 800px at 80% -10%, #2a2565 0%, transparent 55%),
              radial-gradient(900px 700px at -10% 110%, #143a5c 0%, transparent 55%),
              linear-gradient(160deg, var(--bg0), var(--bg1));
  background-attachment: fixed;
  color: var(--txt);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ─── מסכים ─── */
.screen {
  display: none;
  min-height: 100dvh;
  max-width: 560px;
  margin: 0 auto;
  padding: max(18px, env(safe-area-inset-top)) 18px calc(24px + env(safe-area-inset-bottom));
  flex-direction: column;
  animation: fadeIn .35s ease;
}
.screen.on { display: flex; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

h1 { font-size: 34px; font-weight: 800; letter-spacing: -.5px; }
h2 { font-size: 22px; font-weight: 800; }
.sec-title { margin: 22px 0 10px; font-size: 17px; color: var(--dim); font-weight: 700; }
.dim { color: var(--dim); font-size: 13px; }

/* ─── כפתורים ─── */
.btn {
  font-family: inherit; font-size: 16px; font-weight: 700; color: var(--txt);
  background: var(--card2); border: 1px solid var(--line); border-radius: 16px;
  padding: 13px 20px; cursor: pointer; transition: transform .12s, filter .15s, opacity .2s;
  user-select: none;
}
.btn:active { transform: scale(.96); }
.btn:disabled { opacity: .45; cursor: default; }
.btn-primary {
  background: linear-gradient(135deg, var(--acc), #5a49d8);
  border: none; box-shadow: 0 6px 20px rgba(124,108,240,.4);
}
.btn-primary:not(:disabled):hover { filter: brightness(1.1); }
.btn-big { width: 100%; padding: 16px; font-size: 18px; border-radius: 18px; }
.btn-ghost { background: transparent; }
.btn-gold { background: linear-gradient(135deg, #f6c453, #e8963e); border: none; color: #2c1c00; box-shadow: 0 6px 18px rgba(246,196,83,.35); }
.btn-wa { background: var(--wa); border: none; color: #04250f; width: 100%; }
.btn-mini { padding: 8px 12px; font-size: 15px; border-radius: 12px; }

/* ─── שדות ─── */
.txt {
  font-family: inherit; font-size: 17px; color: var(--txt);
  background: rgba(0,0,0,.28); border: 1.5px solid var(--line); border-radius: 14px;
  padding: 13px 16px; width: 100%; outline: none; transition: border-color .15s;
}
.txt:focus { border-color: var(--acc2); }
.txt::placeholder { color: #6a739c; }
.fld-label { display: block; margin: 18px 0 8px; font-size: 14px; color: var(--dim); font-weight: 600; }
.err-line { color: var(--red); font-size: 14px; min-height: 20px; margin: 8px 0; font-weight: 600; }

/* ─── מסך כניסה ─── */
#screen-login { justify-content: center; }
.login-box { width: 100%; }
.logo { text-align: center; margin-bottom: 26px; }
.logo-emoji { font-size: 74px; filter: drop-shadow(0 8px 24px rgba(124,108,240,.55)); animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
.logo h1 { background: linear-gradient(90deg, #fff, var(--acc2)); -webkit-background-clip: text; background-clip: text; color: transparent; }
.tagline { color: var(--dim); margin-top: 6px; font-size: 15px; }
.avatar-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
.avatar-opt {
  font-size: 30px; padding: 9px 0; text-align: center; background: var(--card);
  border: 2px solid transparent; border-radius: 14px; cursor: pointer; transition: transform .12s, border-color .12s;
}
.avatar-opt:hover { transform: scale(1.08); }
.avatar-opt.sel { border-color: var(--acc2); background: rgba(124,108,240,.22); }
#btn-login { margin-top: 24px; }
.login-note { text-align: center; color: var(--dim); font-size: 12px; margin-top: 12px; }

/* ─── מסך בית ─── */
.home-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
.prof { display: flex; align-items: center; gap: 10px; }
.prof-avatar { font-size: 38px; background: var(--card); border-radius: 14px; padding: 5px 9px; }
.prof b { font-size: 18px; }
.record { color: var(--dim); font-size: 12px; margin-top: 2px; }
.wallet { display: flex; gap: 8px; }
.chip { background: var(--card); border: 1px solid var(--line); border-radius: 999px; padding: 8px 14px; font-size: 14px; white-space: nowrap; }
.chip b { font-size: 15px; }
.chip-money b { color: var(--gold); }
.chip-energy b { color: var(--green); }
.energy-timer { font-size: 11px; color: var(--dim); margin-right: 5px; }

.leagues { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.league-card {
  font-family: inherit; color: var(--txt); text-align: center;
  background: var(--card); border: 2px solid var(--line); border-radius: var(--r);
  padding: 14px 6px; cursor: pointer; transition: transform .15s, border-color .15s, background .15s;
}
.league-card:hover { transform: translateY(-3px); }
.league-card.sel { border-color: var(--acc2); background: rgba(124,108,240,.2); box-shadow: 0 8px 24px rgba(124,108,240,.25); }
.league-icon { font-size: 34px; }
.league-name { font-weight: 800; font-size: 16px; margin-top: 4px; }
.league-fee { color: var(--gold); font-size: 13px; font-weight: 700; margin-top: 3px; }
.league-pot { color: var(--dim); font-size: 11px; margin-top: 2px; }
.energy-note { color: var(--dim); font-size: 12px; text-align: center; margin-top: 10px; }

.home-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 18px; }
.hist { display: flex; flex-direction: column; gap: 8px; }
.hist-item {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--card); border-radius: 14px; padding: 11px 14px; font-size: 14px;
}
.hist-item .h-res { font-weight: 800; }
.hist-item .h-win { color: var(--green); }
.hist-item .h-lose { color: var(--red); }
.hist-item .h-tie { color: var(--dim); }
.hist-empty { color: var(--dim); text-align: center; padding: 18px; font-size: 14px; }
.home-foot { display: flex; align-items: center; justify-content: space-between; margin-top: auto; padding-top: 24px; }

/* ─── חדר ─── */
.center-box { width: 100%; max-width: 420px; margin: auto; display: flex; flex-direction: column; gap: 14px; text-align: center; }
.league-banner {
  background: rgba(124,108,240,.18); border: 1px solid rgba(124,108,240,.4);
  border-radius: 999px; padding: 8px 18px; font-weight: 800; font-size: 15px; align-self: center;
}
.room-code {
  font-size: 58px; font-weight: 900; letter-spacing: 14px; padding: 10px 0 10px 0;
  text-indent: 14px; direction: ltr;
  background: linear-gradient(90deg, var(--gold), #ffe7a3); -webkit-background-clip: text; background-clip: text; color: transparent;
  text-shadow: 0 0 40px rgba(255,209,102,.25);
}
.room-status { color: var(--dim); font-size: 15px; min-height: 22px; }
.dots::after { content: ""; animation: dots 1.4s steps(4) infinite; }
@keyframes dots { 0% { content: ""; } 25% { content: "."; } 50% { content: ".."; } 75% { content: "..."; } }
.vs-row { display: flex; align-items: center; justify-content: center; gap: 16px; margin: 8px 0; }
.vs-player {
  background: var(--card); border: 1px solid var(--line); border-radius: var(--r);
  padding: 14px; min-width: 110px; font-weight: 700; font-size: 15px;
}
.vs-player .vp-avatar { font-size: 36px; display: block; }
.vs-player.empty { color: var(--dim); font-size: 28px; border-style: dashed; }
.vs-player.ready { border-color: var(--green); box-shadow: 0 0 18px rgba(61,220,132,.25); }
.vs-x { font-weight: 900; font-size: 20px; color: var(--acc2); }
.code-input { text-align: center; font-size: 34px; letter-spacing: 12px; direction: ltr; font-weight: 800; }

/* ─── משחק ─── */
#screen-game { padding-top: 12px; }
.game-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.g-player {
  background: var(--card); border: 1px solid var(--line); border-radius: 16px;
  padding: 8px 12px; display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700;
  transition: box-shadow .2s, border-color .2s;
}
.g-player .gp-avatar { font-size: 24px; }
.g-player .gp-score { font-size: 20px; font-weight: 900; color: var(--gold); }
.g-player.turn { border-color: var(--acc2); box-shadow: 0 0 16px rgba(124,108,240,.4); }
.g-mid { text-align: center; }
.g-round { font-weight: 800; font-size: 14px; }
.g-pot { color: var(--gold); font-size: 12px; font-weight: 700; }

.g-timer-wrap { position: relative; width: 74px; height: 74px; margin: 14px auto 6px; }
#g-timer-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.t-bg { fill: none; stroke: rgba(255,255,255,.09); stroke-width: 7; }
.t-arc { fill: none; stroke: var(--green); stroke-width: 7; stroke-linecap: round;
  stroke-dasharray: 276.5; stroke-dashoffset: 0; transition: stroke-dashoffset .95s linear, stroke .3s; }
.g-timer-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; }
.g-timer-wrap.hot .t-arc { stroke: var(--red); }
.g-timer-wrap.hot .g-timer-num { color: var(--red); animation: pulse .5s infinite alternate; }
@keyframes pulse { to { transform: scale(1.15); } }

.g-area { display: flex; flex-direction: column; gap: 12px; margin-top: 8px; flex: 1; }
.g-cat {
  font-size: 21px; font-weight: 800; text-align: center; line-height: 1.35;
  background: var(--card); border-radius: var(--r); padding: 16px;
}
.g-turn { text-align: center; font-weight: 800; font-size: 16px; min-height: 24px; }
.g-turn.mine { color: var(--green); }
.g-turn.theirs { color: var(--dim); }
.g-said { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; min-height: 34px; align-content: flex-start; }
.said-chip {
  background: rgba(61,220,132,.14); border: 1px solid rgba(61,220,132,.4); color: #baf5d4;
  border-radius: 999px; padding: 5px 12px; font-size: 13px; font-weight: 700; animation: pop .25s ease;
}
.said-chip.op { background: rgba(124,108,240,.15); border-color: rgba(124,108,240,.45); color: #cdc6ff; }
.said-chip.missed { background: rgba(255,84,112,.12); border-color: rgba(255,84,112,.4); color: #ffb9c6; }
@keyframes pop { from { transform: scale(.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }

.g-input-row { display: flex; gap: 8px; margin-top: auto; }
.g-input-wrap { position: relative; flex: 1; }
.g-input { position: relative; background: rgba(0,0,0,.35); z-index: 2; }
.g-ghost {
  position: absolute; inset: 0; z-index: 1; display: flex; align-items: center;
  padding: 13px 16px; font-size: 17px; color: #5f6890; pointer-events: none; white-space: pre;
  overflow: hidden;
}
.g-input-row .btn { padding-inline: 18px; }
.shake { animation: shake .35s; }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(6px); } 50% { transform: translateX(-6px); } 75% { transform: translateX(4px); } }

.g-q { font-size: 20px; font-weight: 800; text-align: center; line-height: 1.4; background: var(--card); border-radius: var(--r); padding: 18px 14px; }
.g-opts { display: grid; grid-template-columns: 1fr; gap: 9px; }
.opt-btn {
  font-family: inherit; font-size: 16px; font-weight: 700; color: var(--txt); text-align: right;
  background: var(--card2); border: 2px solid var(--line); border-radius: 15px; padding: 13px 16px;
  cursor: pointer; transition: transform .1s, border-color .15s, background .2s;
}
.opt-btn:not(:disabled):hover { border-color: var(--acc2); }
.opt-btn:active { transform: scale(.98); }
.opt-btn.picked { border-color: var(--acc2); background: rgba(124,108,240,.25); }
.opt-btn.correct { border-color: var(--green); background: rgba(61,220,132,.2); }
.opt-btn.wrong { border-color: var(--red); background: rgba(255,84,112,.16); }
.opt-btn:disabled { cursor: default; }
.g-mc-status { text-align: center; color: var(--dim); font-weight: 700; min-height: 22px; }

.g-banner {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  background: rgba(7,10,24,.82); backdrop-filter: blur(6px); z-index: 40; animation: fadeIn .25s;
}
.g-banner-inner { text-align: center; font-size: 26px; font-weight: 900; line-height: 1.5; padding: 24px; animation: bannerZoom .45s cubic-bezier(.2,1.4,.4,1); }
.g-banner-inner .b-sub { font-size: 16px; font-weight: 700; color: var(--dim); margin-top: 10px; }
.g-banner-inner .b-big { font-size: 44px; }
@keyframes bannerZoom { from { transform: scale(.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

/* ─── תוצאות ─── */
.res-emoji { font-size: 84px; animation: bannerZoom .6s cubic-bezier(.2,1.4,.4,1); }
.res-score { font-size: 30px; font-weight: 900; letter-spacing: 2px; }
.res-money { font-size: 24px; font-weight: 900; min-height: 34px; }
.res-money.plus { color: var(--green); }
.res-money.minus { color: var(--red); }
.res-money.zero { color: var(--dim); }

/* ─── מודאל ─── */
.modal {
  position: fixed; inset: 0; z-index: 60; display: flex; align-items: center; justify-content: center;
  background: rgba(5,8,20,.75); backdrop-filter: blur(5px); animation: fadeIn .2s; padding: 20px;
}
.modal[hidden] { display: none; }
.modal-box {
  background: linear-gradient(165deg, #1c2244, #12172f);
  border: 1px solid var(--line); border-radius: 22px; box-shadow: var(--shadow);
  width: 100%; max-width: 380px; padding: 24px; text-align: center;
  display: flex; flex-direction: column; gap: 14px; animation: bannerZoom .3s cubic-bezier(.2,1.3,.4,1);
}
.modal-box h3 { font-size: 20px; }
.modal-amount { font-size: 30px; font-weight: 900; color: var(--gold); }

/* ─── טוסטים ─── */
#toasts { position: fixed; top: max(14px, env(safe-area-inset-top)); left: 0; right: 0; z-index: 80; display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: none; }
.toast {
  background: #1d2447; border: 1px solid var(--line); border-radius: 999px;
  padding: 10px 20px; font-size: 14px; font-weight: 700; box-shadow: var(--shadow);
  animation: toastIn .3s ease; max-width: 90vw;
}
.toast.err { border-color: rgba(255,84,112,.5); color: #ffc4cf; }
.toast.ok { border-color: rgba(61,220,132,.5); color: #c9f7dd; }
@keyframes toastIn { from { transform: translateY(-18px); opacity: 0; } to { transform: none; opacity: 1; } }
.toast.out { transition: opacity .4s, transform .4s; opacity: 0; transform: translateY(-14px); }

/* ─── קונפטי ─── */
#confetti { position: fixed; inset: 0; z-index: 70; pointer-events: none; }

@media (max-width: 400px) {
  .room-code { font-size: 46px; letter-spacing: 10px; text-indent: 10px; }
  .avatar-grid { grid-template-columns: repeat(5, 1fr); }
  h1 { font-size: 28px; }
}

</style>
</head>
<body>

<canvas id="confetti"></canvas>
<div id="toasts"></div>

<!-- ═══════════ מסך כניסה ═══════════ -->
<div id="screen-login" class="screen">
  <div class="login-box">
    <div class="logo">
      <div class="logo-emoji">🧠</div>
      <h1>ראש בראש</h1>
      <p class="tagline">קרב מוחות בזמן אמת · 1 על 1</p>
    </div>
    <label class="fld-label">איך קוראים לך?</label>
    <input id="login-name" class="txt" maxlength="14" placeholder="השם שלך…" autocomplete="off">
    <label class="fld-label">בחר אווטאר</label>
    <div id="avatar-grid" class="avatar-grid"></div>
    <button id="btn-login" class="btn btn-primary btn-big">יאללה, מתחילים! 🚀</button>
    <p class="login-note">חד-פעמי · בלי סיסמאות · הכל נשמר במכשיר שלך</p>
  </div>
</div>

<!-- ═══════════ מסך בית ═══════════ -->
<div id="screen-home" class="screen">
  <div class="home-head">
    <div class="prof">
      <span id="home-avatar" class="prof-avatar"></span>
      <div>
        <b id="home-name"></b>
        <div id="home-record" class="record"></div>
      </div>
    </div>
    <div class="wallet">
      <div class="chip chip-money">💰 <b id="home-bal"></b> ₪</div>
      <div class="chip chip-energy">⚡ <b id="home-energy"></b><span class="dim">/100</span><span id="energy-timer" class="energy-timer"></span></div>
    </div>
  </div>

  <h2 class="sec-title">בחר ליגה</h2>
  <div class="leagues">
    <button class="league-card" data-league="beg">
      <div class="league-icon">🥉</div>
      <div class="league-name">מתחיל</div>
      <div class="league-fee">50 ₪ כניסה</div>
      <div class="league-pot">הקופה: 100 ₪</div>
    </button>
    <button class="league-card" data-league="adv">
      <div class="league-icon">🥈</div>
      <div class="league-name">מתקדם</div>
      <div class="league-fee">125 ₪ כניסה</div>
      <div class="league-pot">הקופה: 250 ₪</div>
    </button>
    <button class="league-card" data-league="pro">
      <div class="league-icon">🥇</div>
      <div class="league-name">מקצוען</div>
      <div class="league-fee">500 ₪ כניסה</div>
      <div class="league-pot">הקופה: 1,000 ₪</div>
    </button>
  </div>
  <p class="energy-note">כל משחק עולה ⚡2 אנרגיה · מתחדש +1 כל 5 דקות</p>

  <div class="home-actions">
    <button id="btn-create" class="btn btn-primary btn-big">🎮 צור חדר</button>
    <button id="btn-join" class="btn btn-ghost btn-big">🔑 הצטרף עם קוד</button>
  </div>

  <h3 class="sec-title">משחקים אחרונים</h3>
  <div id="hist-list" class="hist"></div>

  <div class="home-foot">
    <button id="btn-mute" class="btn btn-mini">🔊</button>
    <span class="dim">ראש בראש · גרסה אישית · לא למכירה</span>
  </div>
</div>

<!-- ═══════════ מסך הצטרפות ═══════════ -->
<div id="screen-join" class="screen">
  <div class="center-box">
    <h2>הצטרפות לחדר</h2>
    <p class="dim">הקלד את הקוד שקיבלת מהחבר</p>
    <input id="join-code" class="txt code-input" maxlength="4" placeholder="••••" autocomplete="off" autocapitalize="characters">
    <div id="join-err" class="err-line"></div>
    <button id="btn-join-go" class="btn btn-primary btn-big">התחבר 🔌</button>
    <button id="btn-join-back" class="btn btn-ghost">חזרה</button>
  </div>
</div>

<!-- ═══════════ מסך חדר ═══════════ -->
<div id="screen-room" class="screen">
  <div class="center-box">
    <div id="room-league" class="league-banner"></div>
    <div id="room-code-wrap">
      <p class="dim">קוד החדר שלך</p>
      <div id="room-code" class="room-code"></div>
      <button id="btn-share-wa" class="btn btn-wa">📲 שלח קוד בוואטסאפ</button>
    </div>
    <div id="room-status" class="room-status">ממתין ליריב…<span class="dots"></span></div>
    <div class="vs-row">
      <div id="room-me" class="vs-player"></div>
      <div class="vs-x">VS</div>
      <div id="room-opp" class="vs-player empty">?</div>
    </div>
    <div id="room-fee-line" class="dim"></div>
    <button id="btn-ready" class="btn btn-primary btn-big" disabled>מוכן! ✅</button>
    <button id="btn-transfer" class="btn btn-gold" hidden>💸 העברת כסף</button>
    <button id="btn-leave" class="btn btn-ghost">יציאה מהחדר</button>
  </div>
</div>

<!-- ═══════════ מסך משחק ═══════════ -->
<div id="screen-game" class="screen">
  <div class="game-top">
    <div id="g-me" class="g-player"></div>
    <div class="g-mid">
      <div id="g-round" class="g-round"></div>
      <div id="g-pot" class="g-pot"></div>
    </div>
    <div id="g-opp" class="g-player"></div>

function judgeAgainst(indexArr, saidSet, text) {
  const t = norm(text);
  if (!t) return { hit: -1 };
  for (const it of indexArr) if (it.acc.includes(t)) return { hit: it.idx, dup: saidSet.has(it.idx) };
  if (t.length >= 4) {
    for (const it of indexArr) for (const a of it.acc) {
      if (a.length >= 4 && lev(t, a, 1) <= 1) return { hit: it.idx, dup: saidSet.has(it.idx) };
    }
  }
  return { hit: -1 };
}
/* השלמה אוטומטית: פריט יחיד שטרם נאמר שמתחיל בטקסט */
function completeText(indexArr, saidSet, text) {
  const t = norm(text);
  if (t.length < 2) return null;
  let found = null;
  for (const it of indexArr) {
    if (saidSet.has(it.idx)) continue;
    const v = it.acc.find(a => a.startsWith(t));
    if (v) { if (found && found.idx !== it.idx) return null; found = { idx: it.idx, canon: it.canon }; }
  }
  return found;
}

const CV = $("confetti"), CX = CV.getContext("2d");
let confParts = [], confRun = false;
function confetti() {
  CV.width = innerWidth; CV.height = innerHeight;
  confParts = Array.from({ length: 160 }, () => ({
    x: Math.random() * CV.width, y: -20 - Math.random() * CV.height * .5,
    vx: (Math.random() - .5) * 2.4, vy: 2 + Math.random() * 3.5,
    s: 5 + Math.random() * 7, r: Math.random() * Math.PI,
    c: ["#ffd166", "#7c6cf0", "#3ddc84", "#ff5470", "#4cc9f0", "#fff"][Math.floor(Math.random() * 6)]
  }));
  if (!confRun) { confRun = true; confLoop(); }
  setTimeout(() => { confParts = []; }, 4200);
}
function confLoop() {
  CX.clearRect(0, 0, CV.width, CV.height);
  confParts.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.r += .08;
    CX.save(); CX.translate(p.x, p.y); CX.rotate(p.r);
    CX.fillStyle = p.c; CX.fillRect(-p.s / 2, -p.s / 2, p.s, p.s * .6); CX.restore();
  });
  confParts = confParts.filter(p => p.y < CV.height + 30);
  if (confParts.length) requestAnimationFrame(confLoop); else { confRun = false; CX.clearRect(0, 0, CV.width, CV.height); }
}

/* ═══════════ רשת P2P ═══════════ */
const NET = { peer: null, conn: null, isHost: false, code: "", open: false };
let PH = "idle"; // idle | room | match | result
let OPP = null;  // {pid, name, avatar}
let ROOM = { league: "beg", meReady: false, opReady: false, rem: { me: false, op: false } };

const MSG_FIELDS = {
  hello: ["pid", "name", "avatar"], ready: [], start: ["mid", "league", "first", "plan"],
  r_start: ["i", "kind"], l_input: ["text"], l_ok: ["by", "word", "next"], l_bad: ["by", "reason"],
  l_end: ["win", "reason", "scores"], mc_ans: ["i"], mc_picked: ["by"], mc_end: ["correct", "picks", "scores"],
  m_end: ["scores", "win"], rematch: [], transfer_req: ["id", "amount"], transfer_ok: ["id"], transfer_no: ["id"], bye: [],
  ping: [], pong: []
};
const HOST_ONLY_RX = new Set(["l_input", "mc_ans"]);   // רק המארח מקבל
const GUEST_ONLY_RX = new Set(["start", "r_start", "l_ok", "l_bad", "l_end", "mc_end", "m_end"]); // רק האורח מקבל

function netSend(t, p = {}) { if (NET.open && NET.conn) { try { NET.conn.send(JSON.stringify(Object.assign({ t }, p))); } catch {} } }
function netReset() {
  try { NET.conn && NET.conn.close(); } catch {}
  try { NET.peer && NET.peer.destroy(); } catch {}
  NET.peer = NET.conn = null; NET.open = false; NET.isHost = false; NET.code = "";
  OPP = null; ROOM = { league: S ? S.lg : "beg", meReady: false, opReady: false, rem: { me: false, op: false } };
}

function hostRoom(attempt = 0) {
  netReset(); NET.isHost = true; NET.code = makeCode(); ROOM.league = S.lg; PH = "room";
  renderRoom(); show("screen-room");
  $("room-status").innerHTML = 'פותח חדר…<span class="dots"></span>';
  const peer = new Peer(CFG.PREFIX + NET.code, { debug: 0 });
  NET.peer = peer;
  peer.on("open", () => {
    if (peer !== NET.peer) return;
    $("room-status").innerHTML = 'ממתין ליריב…<span class="dots"></span>';
  });
  peer.on("connection", c => {
    if (NET.conn) { try { c.close(); } catch {} return; }
    bindConn(c);
  });
  peer.on("error", e => {
    if (peer !== NET.peer) return;
    if (e.type === "unavailable-id" && attempt < 3) { hostRoom(attempt + 1); return; }
    roomError(e);
  });
}
function joinRoom(code) {
  netReset(); NET.isHost = false; NET.code = code; PH = "room";
  const peer = new Peer({ debug: 0 });
  NET.peer = peer;
  let done = false;
  peer.on("open", () => {
    if (peer !== NET.peer) return;
    const c = peer.connect(CFG.PREFIX + code, { reliable: true });
    bindConn(c);
    setTimeout(() => { if (!done && !NET.open && peer === NET.peer) { joinFail("לא הצלחתי להתחבר — בדוק את הקוד ואת האינטרנט"); } }, 12000);
  });
  peer.on("error", e => {
    if (peer !== NET.peer) return;
    if (e.type === "peer-unavailable") joinFail("חדר לא נמצא 🤔 בדוק שהקוד נכון ושהחבר עדיין בחדר");
    else if (!done) joinFail(netErrText(e));
  });
  NET._joinDone = () => { done = true; };
}
function joinFail(msg) { netReset(); PH = "idle"; $("join-err").textContent = msg; show("screen-join"); }
function netErrText(e) {
  if (!navigator.onLine) return "אין חיבור לאינטרנט 📡";
  return "שגיאת רשת (" + (e && e.type || "?") + ") — נסה שוב";
}
function roomError(e) { toast(netErrText(e), "err", 4000); goHome(); }

function bindConn(c) {
  NET.conn = c;
  c.on("open", () => {
    NET.open = true; NET.lastRx = now(); NET._joinDone && NET._joinDone();
    netSend("hello", { pid: S.pid, name: S.name, avatar: S.avatar, v: CFG.V });
  });
  c.on("data", raw => { try { onMsg(raw); } catch (err) { console.error(err); } });
  c.on("close", onConnClosed);
  c.on("error", () => {});
}

/* ולידציית הודעות */
function onMsg(raw) {
  let m; try { m = JSON.parse(String(raw)); } catch { return; }
  if (!m || typeof m.t !== "string" || !(m.t in MSG_FIELDS)) return;
  for (const f of MSG_FIELDS[m.t]) if (!(f in m)) return;
  if (NET.isHost && GUEST_ONLY_RX.has(m.t)) return;
  if (!NET.isHost && HOST_ONLY_RX.has(m.t)) return;
  NET.lastRx = now();
  const H = RX[m.t]; if (H) H(m);
}

/* בחירת סבבים (מארח) */
function pickPool(pool, recent, n, harder) {
  let p = pool.filter(x => !recent.includes(x.key));
  if (p.length < n) p = pool.slice();
  p = shuffle(p);
  if (harder) p.sort((a, b) => b.d - a.d + (Math.random() - .5));
  return p.slice(0, n);
}
function hostPickPlan(league) {
  const dOK = league === "beg" ? d => d <= 2 : league === "adv" ? () => true : d => d >= 2;
  let lists = QDB.lists.map((c, i) => ({ key: c.id, i, d: c.d })).filter(x => dOK(x.d));
  let mcs = QDB.mc.map((q, i) => ({ key: "m" + i, i, d: q.d })).filter(x => dOK(x.d));
  if (lists.length < CFG.LIST_ROUNDS) lists = QDB.lists.map((c, i) => ({ key: c.id, i, d: c.d }));
  if (mcs.length < CFG.MC_ROUNDS) mcs = QDB.mc.map((q, i) => ({ key: "m" + i, i, d: q.d }));
  const L = pickPool(lists, S.recentL, CFG.LIST_ROUNDS, league === "pro");
  const Q = pickPool(mcs, S.recentM, CFG.MC_ROUNDS, false);
  S.recentL = L.map(x => x.key).concat(S.recentL).slice(0, 15);
  S.recentM = Q.map(x => x.key).concat(S.recentM).slice(0, 60);
  save();
  const rounds = shuffle(L.map(x => ({ kind: "list", li: x.i })).concat(Q.map(x => ({ kind: "mc", qi: x.i }))));
  return rounds;
}

function banner(html, ms = 1600) {

/* ─── ניהול סבבים (מארח) ─── */
function hostNextRound() {
  if (!NET.isHost || PH !== "match") return;
  M.i++;
  if (M.i >= HOST.plan.length) { hostEndMatch(); return; }
  const r = HOST.plan[M.i];
  clearTimeout(tHost);
  if (r.kind === "list") {
    const cat = QDB.lists[r.li];
    HOST.listIndex = buildListIndex(cat);
    HOST.remaining = cat.items.length;
    M.starter = M.starter === S.pid ? OPP.pid : S.pid; // מתחלפים מי פותח
    const msg = { i: M.i, kind: "list", li: r.li, turn: M.starter, dur: CFG.LIST_TURN_S };
    netSend("r_start", msg); applyRoundStart(msg);
    hostArmListTimer();
  } else {
    const q = QDB.mc[r.qi];
    const order = shuffle([0, 1, 2, 3]);
    HOST.correct = order.indexOf(q.c);
    HOST.picks = {};
    const msg = { i: M.i, kind: "mc", q: q.q, o: order.map(x => q.o[x]), dur: CFG.MC_S };
    netSend("r_start", msg); applyRoundStart(msg);
    tHost = setTimeout(hostEndMc, CFG.BANNER_MS + CFG.MC_S * 1000 + CFG.GRACE_MS);
  }
}
function hostArmListTimer() {
  clearTimeout(tHost);

  tHost = setTimeout(() => hostListTimeout(), (M.i === HOST._armedRound ? 0 : CFG.BANNER_MS) + CFG.LIST_TURN_S * 1000 + grace);
  HOST._armedRound = M.i;
}

RX.r_start = m => { if (PH === "match") applyRoundStart(m); };

}
function renderTurn() {

  el.className = "g-turn " + (mine ? "mine" : "theirs");

/* ─── סבב רשימה: קלט ─── */
function submitList() {
  if (!M || M.kind !== "list" || M.turn !== S.pid) return;
  const inp = $("g-input");
  let text = inp.value.trim();
  if (!text) return;
  const comp = completeText(M.clientIndex, M.saidSet, text);
  const exact = judgeAgainst(M.clientIndex, M.saidSet, text);
  if (exact.hit < 0 && comp) text = comp.canon;   // השלמה אוטומטית
  sClick();
  if (NET.isHost) hostJudge(S.pid, text);
  else { netSend("l_input", { text }); inp.disabled = true; setTimeout(() => { if (M && M.turn === S.pid) inp.disabled = false; }, 2500); }
}
RX.l_input = m => { // מארח מקבל מהאורח
  if (PH !== "match" || !M || M.kind !== "list" || M.turn !== OPP.pid) return;
  hostJudge(OPP.pid, String(m.text).slice(0, 60));
};
function hostJudge(by, text) {
  const res = judgeAgainst(HOST.listIndex, M.saidSet, text);
  if (res.hit >= 0 && !res.dup) {
    const word = HOST.listIndex[res.hit].canon;
    M.saidSet.add(res.hit); HOST.remaining--;
    const next = by === S.pid ? OPP.pid : S.pid;
    const msg = { by, word, next, hi: res.hit };
    netSend("l_ok", msg); applyListOk(msg);
    if (HOST.remaining <= 0) {
      clearTimeout(tHost);
      M.scores[S.pid]++; M.scores[OPP.pid]++;
      const em = { win: null, reason: "exhausted", scores: M.scores, missed: [] };
      netSend("l_end", em); applyListEnd(em);
      setTimeout(hostNextRound, 2600);
    } else {
      M.turn = next; hostArmListTimer();
    }
  } else {
    const msg = { by, reason: res.hit >= 0 ? "dup" : "wrong" };
    netSend("l_bad", msg); applyListBad(msg);
  }
}
function hostListTimeout() {
  if (PH !== "match" || !M || M.kind !== "list") return;
  const loser = M.turn, win = loser === S.pid ? OPP.pid : S.pid;
  M.scores[win]++;
  const missed = HOST.listIndex.filter(it => !M.saidSet.has(it.idx)).slice(0, 6).map(it => it.canon);
  const more = HOST.remaining - missed.length;
  const em = { win, reason: "timeout", scores: M.scores, missed, more: Math.max(0, more) };
  netSend("l_end", em); applyListEnd(em);
  setTimeout(hostNextRound, 3000);
}
RX.l_ok = m => { if (PH === "match" && M && M.kind === "list") applyListOk(m); };
RX.l_bad = m => { if (PH === "match" && M && M.kind === "list") applyListBad(m); };
RX.l_end = m => { if (PH === "match" && M && M.kind === "list") applyListEnd(m); };

function applyListOk(m) {
  M.saidSet.add(m.hi);

  chip.textContent = m.word;
  $("g-said").appendChild(chip);

  $("g-input").disabled = M.turn !== S.pid;
  renderTurn();
  startUiTimer(M.dur, 0);
}

}
function applyListEnd(m) {

    $("g-said").appendChild(chip);
  });
  if (m.more) {

    chip.className = "said-chip missed"; chip.textContent = `ועוד ${m.more}…`;
    $("g-said").appendChild(chip);
  }
  $("g-input").disabled = true; $("g-send").disabled = true;
  let html;
  if (m.win === null) { html = `🤝 תיקו!<div class="b-sub">כל התשובות נאמרו — נקודה לכל אחד</div>`; sGood(); }
  else if (m.win === S.pid) { html = `🎉 נקודה לך!<div class="b-sub">${OPP.name} לא ענה בזמן</div>`; sWin(); }
  else { html = `😬 נקודה ל${OPP.name}<div class="b-sub">לא ענית בזמן</div>`; sLose(); }
  banner(html, 2300);

/* ─── שאלה אמריקאית ─── */
function pickMc(i, btn) {
  if (!M || M.kind !== "mc" || M.myPick >= 0) return;
  M.myPick = i; sClick();
  document.querySelectorAll(".opt-btn").forEach(b => b.disabled = true);
  btn.classList.add("picked");
  $("g-mc-status").textContent = "ממתין ליריב…";

}
RX.mc_ans = m => { if (PH === "match" && M && M.kind === "mc") hostMcPick(OPP.pid, m.i | 0); };
RX.mc_picked = m => {
  if (PH !== "match" || !M || M.kind !== "mc") return;
  if (m.by === OPP.pid && M.myPick < 0) $("g-mc-status").textContent = `${OPP.name} כבר ענה! ⏰`;
};
function hostMcPick(by, i) {
  if (!(by in M.scores) || by in HOST.picks) return;

  HOST.picks[by] = i;
  netSend("mc_picked", { by });

}

    meOk ? "צדקת! נקודה לך 🎉" :

}

/* ─── סוף משחק ─── */

}
RX.m_end = m => { if (PH === "match" && M) applyMatchEnd(m); };
function applyMatchEnd(m) {

  const my = M.scores[S.pid], op = M.scores[OPP.pid];

  if (m.win === S.pid) { delta = fee; S.bal += fee * 2; S.w++; }
  else if (m.win === null) { delta = 0; S.bal += fee; S.t++; }
  else { delta = -fee; S.l++; }

  $("res-title").textContent = m.win === S.pid ? "ניצחת!" : m.win === null ? "תיקו!" : "הפסדת…";
  $("res-score").textContent = `${my} : ${op}`;

    TR.timer = setTimeout(() => { if (TR) { TR = null; closeModal(); toast("ההעברה לא אושרה בזמן", "err"); } }, 25000);
  };

RX.transfer_req = m => {

/* ═══════════ ניתוקים ועזיבות ═══════════ */

    sClick(); hostRoom();
  };
  $("btn-join").onclick = () => { ac(); sClick(); $("join-code").value = ""; $("join-err").textContent = ""; show("screen-join"); setTimeout(() => $("join-code").focus(), 80); };
  $("btn-mute").onclick = () => { S.muted = !S.muted; save(); renderHome(); };
}

function initJoin() {
  $("btn-join-back").onclick = () => { netReset(); show("screen-home"); };
  const go = () => {
    const code = $("join-code").value.trim().toUpperCase();
    if (!/^[A-Z2-9]{4}$/.test(code)) { $("join-err").textContent = "קוד לא תקין — 4 תווים באנגלית/ספרות"; return; }
    $("join-err").textContent = "";
    $("btn-join-go").disabled = true;
    setTimeout(() => $("btn-join-go").disabled = false, 3000);
    joinRoom(code);
    $("room-status").innerHTML = 'מתחבר…<span class="dots"></span>';
    renderRoom(); show("screen-room");
  };
  $("btn-join-go").onclick = go;
  $("join-code").addEventListener("keydown", e => { if (e.key === "Enter") go(); });
  $("join-code").addEventListener("input", () => { $("join-code").value = $("join-code").value.toUpperCase().replace(/[^A-Z2-9]/g, ""); });
}

function initRoom() {
  $("btn-ready").onclick = () => {
    if (!OPP || ROOM.meReady) return;
    if (!canAfford(CFG.LEAGUES[ROOM.league].fee)) return;
    ROOM.meReady = true; sClick(); renderRoom();
    netSend("ready");
    maybeStart();
  };
  $("btn-leave").onclick = goHome;
  $("btn-transfer").onclick = openTransfer;
  $("btn-share-wa").onclick = () => {
    const isWeb = /^https?:$/.test(location.protocol) && !/^(localhost|127\.)/.test(location.hostname);
    const open = isWeb ? `היכנס לקישור:\n${location.origin + location.pathname}\n` : `פתח את הקובץ ששלחתי לך, `;
    const txt = `🧠 בוא נשחק "ראש בראש"!\n${open}לחץ "הצטרף עם קוד" והקלד: ${NET.code}\nמחכה לך! ⚔️`;
    window.open("https://wa.me/?text=" + encodeURIComponent(txt), "_blank");
  };
}

function initGame() {
  $("g-send").onclick = submitList;
  $("g-input").addEventListener("keydown", e => { if (e.key === "Enter") submitList(); });
  $("g-input").addEventListener("input", () => {
    const inp = $("g-input"), ghost = $("g-ghost");
    if (!M || M.kind !== "list" || M.turn !== S.pid) { ghost.textContent = ""; return; }
    const comp = completeText(M.clientIndex, M.saidSet, inp.value);
    if (comp && norm(comp.canon) !== norm(inp.value)) ghost.textContent = inp.value + "  ← " + comp.canon;
    else ghost.textContent = "";
  });
}

function initResult() {
  $("btn-rematch").onclick = reqRematch;
  $("btn-res-home").onclick = goHome;
}

/* ─── הפעלה ─── */
window.addEventListener("beforeunload", () => { if (NET.open) netSend("bye"); });
window.addEventListener("resize", () => { if (confParts.length) { CV.width = innerWidth; CV.height = innerHeight; } });

S = load();
if (!S) { S = defState(); save(); }
if (store.volatile) setTimeout(() => toast("⚠️ הדפדפן חוסם שמירה — היתרה תתאפס בסגירה. עדיף לשמור את הקובץ ולפתוח בכרום/ספארי", "err", 7000), 800);
tickEnergy();
initLogin(); initHome(); initJoin(); initRoom(); initGame(); initResult();
if (S.name) { renderHome(); show("screen-home"); } else show("screen-login");

</script>
</body>
</html>
